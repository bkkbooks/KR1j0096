body:
  text: 爾雅謝氏音釋詁第一洋觀音官陸德明釋文引顧謝尼定尼羊而反釋文施易也施易皆以豉反注同釋文弛易顧謝本弛作施並易皆云云串貫串古患反釋文引沈謝顯間古閑反釋文㕟齂海拜反釋文引郭施謝歷秭算數也數色主反釋文乂亂靖神弗淈治也治如字即尼也尼奴啟反下同並同上釋言第二觀指示也觀音官注同釋文邕支載也邕字又作擁擁者護之邢昺疏諈諉累也諈之睡反諉音𣨙釋文邕危切集韻上平聲五支諉字注紕飾紕房彌反釋文舫舟也舫音方洵均也洵龕也洵音荀下句倣此苞稹也稹之忍反粲餐也餐素昆反柢本也柢音帝並同上矧況也志況譬邢昺疏釋訓第三赫赫許格反釋文旭旭許玉反佌佌音紫畇畇蘇均反溞溞所留反尼居息也尼羊而反又奴啟反崇讒慝也慝切得反萲諼忘也萲許袁反恂慄也恂私尹反並同上釋器第六斪斸謂之定斪古侯鳩于二反釋文槮謂之涔槮胥寢反絇謂之救絇其俱反衿謂之袸徂悶反摶者謂之糷力丹反並同上釋樂第七所以鼓敔謂之籈居延反釋文釋天第八夏為長嬴長丁兩反釋文釋丘第十水出其後沮丘沮子預反釋文如覆敦者敦丘敦如字前高旄丘旄音毛並同上釋水第十二濄為洵濄古禾反又烏禾反釋文大史大音泰同上釋草第十三𦸣鼠莞音官釋文瓠棲瓣力見反葖蘆萉蘆力吳反苬芝苬音由並同上熒荽萎荽於薳反萎於危反釋文荽下引謝音又云今本作委芍鳧茈徂咨反薜萸草庾羊主反蔜𧃒先老反並同上蓾蔖才古反釋文引施謝出隧籧蔬籧音渠蔬音疏釋文雚芄蘭雚音官釋文古丸切艸名集韻上平聲二十六桓雚字注引謝橋讀蔨鹿𧆑蔨其隕反釋文莞苻蘺莞音官紅蘢古其大者蘬邱軌反蓫薚馬尾薚他唐反倚商活脫倚於倚反或其綺反並同上藒車芞藇釋文輿字或作藇音餘唯郭謝及舍人本同眾家並作蒢藒起例反釋文去例切香艸集韻去聲十三祭藒字注芞去訖反藇音餘釋文鉤藈姑藈音圭釋文引顧謝望乘車乘市證反釋文菟蒵顆涷音東芏夫王夫音方于反同上藄月爾藄音其邢疏本作藄釋文出藄字引施謝姚莖涂齊莖方耕反釋文菤耳苓耳菤九轉反釋文菤謝作卷云云藨麃藨蒲苗反麃蒲表反釋文茢勃茢二茢皆音列釋文引施謝搴柜朐搴去虔反釋文芺薊其實荂芙烏兆反猋藨芀藨苻曲反一音皮兆反並同上葦醜芀集韻引作刀葦于歸反釋文于非切艸名集韻下平聲八微葦字注蕍芛葟華榮芛私尹反釋文荄根荄音該釋文引顧謝釋木第十四楥柜枊柜音巨釋文栩杼嘗汝反菋荎著荎大結反瘣木苻婁力侯反枹遒木魁瘣魁力罪反並同上棤皵棤思積切集韻入聲二十二昔棤字注皵音舄釋文釋蟲第十五蜓蚞螇螰蜓徒頂反釋文諸慮奚相息亮反蜉蝣渠略蝣音流蛂蟥蛢蛂音弗不過蟷蠰過立臥反蠪朾螘蠪音聾蠭醜螸蠭孚逢反𧐄羊朱反釋文引謝又云螸亦作𧐄云云釋魚第十六蛭蟣蛭豬悌反一音之逸反釋文科斗活東活音括釋文引謝施蜌蠯步佳反釋文引謝又云本今作螷龜三足賁音奔又音墳蠃小者蜬音含大者魧戶郎反三曰攝龜攝之涉反並同上釋鳥第十七鳲鳩鴶鵴布穀類也邢昺疏十一鷑鳩鵧鷑鵧苻悲反釋文鵱鷜鵝鷜力侯反釋文引謝施桃蟲鷦其雌鴱五蓋反釋文生哺鷇苦候反鴢頭鵁鴢鳥卯反鵹黃楚雀鵹力知反釋文引阮謝鸕諸雉鸕力吳反釋文鷩雉鷩必滅反秩秩海雉秩持乙反西方曰鷷徂尊反並同上釋獸第十八虎竊毛謂之虦貓虦七版反釋文牛曰齝初其反同上釋畜第十九回毛在膺宜乘市證反釋文青驪駽犬縣反釋文引謝孫馬色集韻去聲三十二霰駽犬縣切馬色引爾雅謝嶠讀角三觠羷觠居轉反羷許簡反釋文
